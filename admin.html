<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0a0f1c;color:#e2e8f0;}

.container{max-width:1100px;margin:auto;padding:20px;}

.panel{
background:#111827;
border:1px solid #1f2937;
border-radius:12px;
padding:20px;
margin:20px 0;
}

h2{color:#60a5fa;margin-bottom:10px;}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #1f2937;
background:#020617;
color:white;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
}

.logout{
background:#ef4444;
margin-top:10px;
}

.visitor{
border-bottom:1px solid #1f2937;
padding:12px 0;
}

.meta{
font-size:13px;
color:#94a3b8;
}

.hidden{display:none;}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginPanel" class="panel">
<h2>Admin Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<div class="panel">
<h2>Visitor Analytics</h2>
<div id="visitorList">Loading...</div>
<button class="logout" onclick="logout()">Logout</button>
</div>

</div>

</div>

<script>
// CONFIG
const ADMIN_EMAIL = "your@email.com"; // must match rules

const firebaseConfig = {
  apiKey: "AIzaSyA0-LsRe3bmLMsguvsG81bPvoD0FEbz8Q4",
  authDomain: "schoolclosure-554b4.firebaseapp.com",
  databaseURL: "https://schoolclosure-554b4-default-rtdb.firebaseio.com",
  projectId: "schoolclosure-554b4",
  storageBucket: "schoolclosure-554b4.firebasestorage.app",
  messagingSenderId: "491969863737",
  appId: "1:491969863737:web:458a00e13e732adffeade8"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

// LOGIN (NO SIGNUP)
async function login(){
const email=document.getElementById("email").value.trim();
const pass=document.getElementById("password").value.trim();

try{
await auth.signInWithEmailAndPassword(email,pass);
}catch(e){
alert("Invalid login");
}
}

// LOGOUT
function logout(){
auth.signOut();
}

// AUTH STATE
auth.onAuthStateChanged(user=>{
if(user && user.email === ADMIN_EMAIL){
document.getElementById("loginPanel").style.display="none";
document.getElementById("dashboard").classList.remove("hidden");
loadVisitors();
}else{
document.getElementById("loginPanel").style.display="block";
document.getElementById("dashboard").classList.add("hidden");
}
});

// LOAD VISITORS (REAL-TIME)
function loadVisitors(){
const list=document.getElementById("visitorList");

db.collection("visitors")
.orderBy("lastVisit","desc")
.onSnapshot(snapshot=>{
list.innerHTML="";

snapshot.forEach(doc=>{
const d=doc.data();

const div=document.createElement("div");
div.className="visitor";

const first = d.firstVisit?.toDate ? d.firstVisit.toDate().toLocaleString() : "—";
const last = d.lastVisit?.toDate ? d.lastVisit.toDate().toLocaleString() : "—";

div.innerHTML=`
<b>${d.discordUsername}</b>
<div class="meta">
IP: ${d.ip}<br>
Visits: ${d.visits}<br>
First Visit: ${first}<br>
Last Visit: ${last}
</div>
`;

list.appendChild(div);
});

if(snapshot.empty){
list.innerHTML="No data yet.";
}
});
}
</script>

</body>
</html>
