<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Denied</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #0a0f1c;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

/* Panel */
.box {
    width: 100%;
    max-width: 420px;
    background: #111827;
    border: 1px solid #ef4444;
    border-radius: 12px;
    padding: 30px 20px;
    text-align: center;
}

/* Title */
.box h2 {
    color: #ef4444;
    margin-bottom: 10px;
    font-size: 1.8rem;
}

/* Text */
.box p {
    color: #cbd5f5;
    margin-bottom: 20px;
    font-size: 0.95rem;
}

/* Button Link */
a {
    display: inline-block;
    padding: 10px 18px;
    background: #3b82f6;
    color: white;
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.95rem;
    transition: 0.2s;
}

a:hover {
    background: #2563eb;
}

/* Mobile adjustments */
@media (max-width: 480px) {
    .box {
        padding: 25px 15px;
    }

    .box h2 {
        font-size: 1.5rem;
    }

    .box p {
        font-size: 0.9rem;
    }

    a {
        width: 100%;
        padding: 12px;
    }
}
</style>
</head>

<body>

<div class="box">
    <h2>Access Denied</h2>
    <p>You must accept the Terms of Service to access this website.</p>
    <a href="index.html">Return to Home</a>
</div>

</body>
</html>
